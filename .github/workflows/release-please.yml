on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to upload assets to (e.g., v0.1.1)'
        required: true
        type: string

name: release-please

jobs:
  release-please:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-release-please
          domain: octo-sts.fohte.net

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-crates-io:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-release:
    needs: release-please
    # always() is required because release-please job is skipped on workflow_dispatch,
    # and dependent jobs skip without evaluating their if condition by default.
    if: always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      SCCACHE_GHA_ENABLED: 'true'
      RUSTC_WRAPPER: 'sccache'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: rustup show

      - run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        env:
          PROJECT_NAME: ccform
          BINARY_NAME: ccform
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../"$PROJECT_NAME"-${{ matrix.target }}.tar.gz "$BINARY_NAME"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
          PROJECT_NAME: ccform
        run: |
          gh release upload "$TAG_NAME" \
            "$PROJECT_NAME"-${{ matrix.target }}.tar.gz

  publish-homebrew:
    needs: [release-please, build-release]
    # build-release uses always() so this job also needs it to avoid being skipped
    # when release-please is skipped (workflow_dispatch).
    # Also require build-release to succeed so we don't push a formula referencing missing assets.
    if: always() && needs.build-release.result == 'success' && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TAG_NAME: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-publish-homebrew
          domain: octo-sts.fohte.net

      - name: Generate Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"

          sha256_macos_arm64=$(gh release download "$TAG_NAME" --pattern 'ccform-aarch64-apple-darwin.tar.gz' --output - | sha256sum | cut -d ' ' -f 1)
          sha256_linux_arm64=$(gh release download "$TAG_NAME" --pattern 'ccform-aarch64-unknown-linux-gnu.tar.gz' --output - | sha256sum | cut -d ' ' -f 1)
          sha256_linux_x86_64=$(gh release download "$TAG_NAME" --pattern 'ccform-x86_64-unknown-linux-gnu.tar.gz' --output - | sha256sum | cut -d ' ' -f 1)

          sed \
            -e "s|VERSION_PLACEHOLDER|$version|" \
            -e "s|SHA256_MACOS_ARM64_PLACEHOLDER|$sha256_macos_arm64|" \
            -e "s|SHA256_LINUX_ARM64_PLACEHOLDER|$sha256_linux_arm64|" \
            -e "s|SHA256_LINUX_X86_64_PLACEHOLDER|$sha256_linux_x86_64|" \
            .github/formula-template/ccform.rb > ccform.rb

      - name: Push formula to homebrew-tap
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"

          git clone https://github.com/fohte/homebrew-tap.git homebrew-tap
          cd homebrew-tap
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/fohte/homebrew-tap.git"

          mkdir -p Formula
          cp ../ccform.rb Formula/ccform.rb

          git config user.name "fohte-bot[bot]"
          git config user.email "fohte-bot[bot]@users.noreply.github.com"
          git add Formula/ccform.rb
          git diff --cached --quiet || {
            git commit -m "Update ccform to ${version}"
            git push origin main
          }
